<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- document / paper -->
  <g filter="url(#shadow)">
    <rect x="116" y="92" width="280" height="328" rx="20" fill="#FFFFFF"/>
    <!-- folded corner -->
    <path d="M 396 92 L 396 152 L 336 92 Z" fill="#E0E7FF"/>
  </g>

  <!-- header strip (mimicking invoice title) -->
  <rect x="148" y="184" width="216" height="14" rx="6" fill="#4F46E5"/>

  <!-- text lines -->
  <rect x="148" y="230" width="216" height="10" rx="4" fill="#94A3B8"/>
  <rect x="148" y="258" width="180" height="10" rx="4" fill="#CBD5E1"/>
  <rect x="148" y="286" width="200" height="10" rx="4" fill="#CBD5E1"/>
  <rect x="148" y="314" width="150" height="10" rx="4" fill="#CBD5E1"/>

  <!-- total badge -->
  <rect x="148" y="354" width="216" height="36" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="2"/>
  <rect x="164" y="368" width="60" height="8" rx="3" fill="#6366F1"/>
  <rect x="280" y="368" width="68" height="8" rx="3" fill="#1E1B4B"/>

  <!-- ruble symbol -->
  <g transform="translate(56, 56)">
    <circle cx="44" cy="44" r="36" fill="#FFFFFF" opacity="0.95"/>
    <text x="44" y="60" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#4F46E5" text-anchor="middle">₽</text>
  </g>
</svg>
